<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SurviveTheMonth</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <h1>🌿 SurviveTheMonth</h1>
      <p>Enter your credentials, survivor.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="card">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label class="form-label" for="username">Survivor ID</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="your_username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Secret Code</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;">
          🌿 Enter the Jungle
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-footer">
        No account?
        <a href="{{ url_for('register') }}">Register as a new survivor</a>
      </div>

      <div class="auth-footer" style="margin-top:0.5rem;">
        <a href="{{ url_for('demo') }}">See the live demo →</a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
