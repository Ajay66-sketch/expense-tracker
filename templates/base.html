<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurviveTheMonth 🌿</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/svg+xml">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0a0f0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="survival-nav p-4 flex justify-between items-center mb-6">
        <h1 class="font-black text-xl tracking-tight survival-nav-brand">🌿 SurviveTheMonth</h1>
        <div class="flex gap-3 text-sm font-bold">
            <a href="{{ url_for('index') }}" 
               class="px-3 py-1.5 rounded-lg transition-all
               {% if request.path == '/' %} nav-link-active {% else %} nav-link-inactive {% endif %}">
               🗺️ Hub
            </a>
            <a href="{{ url_for('profile') }}" 
               class="px-3 py-1.5 rounded-lg transition-all
               {% if request.path == '/profile' %} nav-link-active {% else %} nav-link-inactive {% endif %}">
               🎖️ Profile
            </a>
        </div>
    </nav>
    
    <main class="max-w-md mx-auto p-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
