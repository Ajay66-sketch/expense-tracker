{% extends "base.html" %}
{% block content %}
<div class="survival-card rounded-2xl p-6">
    <div class="text-center mb-6">
        <div class="text-4xl mb-2">🗓️</div>
        <h2 class="text-2xl font-black survival-title mb-1">Mission Briefing</h2>
        <p class="survival-subtitle text-sm">Set your rations and we'll calculate your daily survival limit.</p>
    </div>

    <form action="{{ url_for('edit') }}" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-bold survival-label mb-1">Total Rations (Pocket Money)</label>
            <input type="number" name="pocket_money" placeholder="e.g. 5000" required
                   class="survival-input w-full rounded-xl px-4 py-3 outline-none transition-all">
        </div>
        <div>
            <label class="block text-sm font-bold survival-label mb-1">Fixed Costs (Mess, Rent, Wi-Fi)</label>
            <input type="number" name="fixed_expenses" placeholder="e.g. 2000" required
                   class="survival-input w-full rounded-xl px-4 py-3 outline-none transition-all">
            <p class="text-xs survival-subtitle mt-1">⚠️ Money already committed — can't be avoided.</p>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold survival-label mb-1">Mission Start</label>
                <input type="date" name="start_date" required
                       class="survival-input w-full rounded-xl px-4 py-3 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold survival-label mb-1">Mission End</label>
                <input type="date" name="end_date" required
                       class="survival-input w-full rounded-xl px-4 py-3 outline-none transition-all">
            </div>
        </div>
        <button type="submit" class="survival-btn w-full font-black py-3 rounded-xl mt-4 transition-all">
            🚀 Start Surviving
        </button>
        {% if has_cycle %}
        <a href="{{ url_for('index') }}" 
           class="block w-full text-center font-bold py-3 rounded-xl transition-all survival-subtitle"
           style="background: rgba(255,255,255,0.04); border: 1px solid rgba(74,160,74,0.15);">
            ← Back to Survival Hub
        </a>
        {% endif %}
    </form>
</div>
{% endblock %}
