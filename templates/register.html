<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SurviveTheMonth</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <h1>🌿 SurviveTheMonth</h1>
      <p>Create your survivor profile.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="card">
      <form method="POST" action="{{ url_for('register') }}">

        <div class="form-group">
          <label class="form-label" for="username">Survivor ID</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="choose_a_username"
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="monthly_budget">
            Monthly Budget (₹)
            <span style="color:var(--text-muted); font-weight:400; text-transform:none; letter-spacing:0">— optional</span>
          </label>
          <input
            type="number"
            id="monthly_budget"
            name="monthly_budget"
            class="form-control"
            placeholder="30000"
            min="1"
            step="100"
          >
          <div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.3rem;">Default: ₹30,000 / month</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Secret Code</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Code</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;">
          🌿 Begin Surviving
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-footer">
        Already a survivor?
        <a href="{{ url_for('login') }}">Log in here</a>
      </div>

      <div class="auth-footer" style="margin-top:0.5rem;">
        <a href="{{ url_for('demo') }}">Check the demo first →</a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
